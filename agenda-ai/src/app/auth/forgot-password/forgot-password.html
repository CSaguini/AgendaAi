<app-navbar-auth></app-navbar-auth>

<div class="flex flex-col justify-center items-center min-h-[91.7vh] bg-[#C7DED5] px-4">
  <div class="flex flex-col md:flex-row w-full max-w-4xl bg-white shadow-2xl rounded-xl overflow-hidden">
    
    <!-- Lado esquerdo: imagem -->
    <div class="flex md:w-1/2 min-h-[420px] items-center justify-center bg-gray-50"
         style="background-image: url('assets/imagem3.jpg'); background-size: cover; background-position: center;">
    </div>

    <!-- Lado direito: formulário -->
    <div class="w-full md:w-1/2 flex flex-col justify-center items-center p-6 md:p-12">
      <div class="w-full max-w-sm flex flex-col items-center gap-6">
        
        <h1 class="text-2xl md:text-3xl font-semibold text-center border-b-2 border-gray-200 pb-3 w-full"
            style="color: rgb(110, 153, 139);">
          Esqueceu sua senha?
        </h1>

        <p class="text-center text-gray-600 text-sm">
          Enviaremos um link de redefinição para o seu e-mail.
        </p>

        <!-- FORM -->
        <form class="w-full flex flex-col gap-4" (submit)="enviarEmail(); $event.preventDefault()">

          <!-- Campo de email -->
          <div class="flex flex-col gap-1 w-full">
            <label for="email" class="text-sm font-medium text-gray-700">Email</label>
            <input 
              id="email"
              type="email"
              [(ngModel)]="email"
              name="email"
              placeholder="email@exemplo.com"
              class="input-field"
              required
            />
          </div>

          <!-- Link para login -->
          <div class="flex flex-col items-center gap-2 text-center w-full">
            <a routerLink="/login" class="link-footer text-sm">Voltar para login</a>
          </div>

          <!-- Botão -->
          <button pButton type="submit" class="footer-button mt-2">
            Enviar código
          </button>

          <!-- Mensagem -->
          <p class="text-center mt-2 font-medium" 
             [ngClass]="{ 'text-green-600': mensagem.includes('sucesso'), 
                          'text-red-600': mensagem.includes('não') || mensagem.includes('Erro') }">
            {{ mensagem }}
          </p>

        </form>

      </div>
    </div>
  </div>
</div>

<app-footer></app-footer>

<!-- Seu CSS permanece o mesmo -->


<style>
  /* 🎨 Paleta padronizada */
  :root {
    --color-primary: rgb(110, 153, 139);
    --color-primary-dark: rgb(88, 128, 115);
  }

  .input-field {
    background-color: white;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 15px;
    color: black;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
  }

  .input-field:focus {
    outline: none;
    border-color: var(--color-primary);
    box-shadow: 0 0 0 3px rgba(110, 153, 139, 0.4);
  }

  .link-footer {
    color: var(--color-primary);
    font-weight: 500;
    text-decoration: none;
    cursor: pointer;
    transition: color 0.2s;
  }

  .link-footer:hover {
    color: var(--color-primary-dark);
    text-decoration: underline;
  }

  .footer-button {
    background-color: rgb(110, 153, 139) ;
    color: white;
    font-weight: 600;
    border: none;
    border-radius: 6px;
    padding: 12px 16px;
    cursor: pointer;
    transition: background-color 0.2s;
    width: 100%;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1),
                0 2px 4px -2px rgba(0, 0, 0, 0.06);
  }

  .footer-button:hover {
    background-color:  rgb(110, 153, 139) ;
  }
  .link-footer {
    color: rgb(110, 153, 139);
    font-weight: 500;
    text-decoration: none;
    transition: color 0.2s;
}

.link-footer:hover {
    color: rgb(88, 128, 115); /* leve escurecimento no hover */
    text-decoration: underline;
}
</style>
