<app-navbar-auth></app-navbar-auth>

<div class="flex flex-col justify-center items-center min-h-[91.7vh] bg-slate-50 px-4">
  <div class="w-full max-w-md bg-white shadow-xl rounded-xl p-6 flex flex-col items-center gap-6">
    
    <h1 class="text-2xl text-[#648f80] font-semibold text-center">
      Digite sua nova senha
    </h1>

    <form class="w-full flex flex-col gap-4" (submit)="resetPassword(); $event.preventDefault()">

      <!-- Nova senha -->
      <div class="flex flex-col gap-1 w-full">
        <input 
          pInputText 
          type="password" 
          [(ngModel)]="newPassword"
          name="newPassword"
          placeholder="Nova Senha" 
          class="input-field"
          required
        />
      </div>

      <!-- Confirmar senha -->
      <div class="flex flex-col gap-1 w-full">
        <input 
          pInputText 
          type="password" 
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          placeholder="Digite a Senha novamente" 
          class="input-field"
          required
        />
      </div>

      <!-- Link Login -->
      <div class="flex flex-col items-center gap-2 text-center w-full">
        <a routerLink="/login" class="link-footer">Login</a>
      </div>

      <!-- Botão -->
      <button pButton type="submit" class="footer-button">
        Confirmar Nova Senha
      </button>

      <!-- Mensagem -->
      <p class="text-center mt-2 font-medium"
         [ngClass]="{ 'text-green-600': mensagem.includes('sucesso'), 
                      'text-red-600': mensagem.includes('Erro') || mensagem.includes('não') }">
        {{ mensagem }}
      </p>

    </form>
  </div>
</div>

<app-footer></app-footer>

<!-- Seu CSS permanece o mesmo -->


<style>
  /* Inputs padronizados */
  .input-field {
    background-color: white;
    border: 1px solid #d1d5db;
    border-radius: 4px;
    padding: 8px 12px;
    font-size: 14px;
    color: black;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-field:focus {
    outline: none;
    border-color: #648f80;
    box-shadow: 0 0 0 2px rgba(100,143,128,0.2);
  }

  /* Links padronizados */
  .link-footer {
    color: #648f80;
    font-weight: 600;
    text-decoration: underline;
    cursor: pointer;
    transition: color 0.2s;
  }

  .link-footer:hover {
    color: rgba(153,197,182,1);
  }

  /* Botão padronizado */
  .footer-button {
    background-color: #648f80;
    color: white;
    font-weight: 600;
    border: none;
    border-radius: 4px;
    padding: 8px 16px;
    cursor: pointer;
    transition: background-color 0.2s;
    width: 100%;
  }

  .footer-button:hover {
    background-color: rgba(153,197,182,1);
    color: white;
  }
</style>
