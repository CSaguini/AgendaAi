<!-- Bolinha do chatbot -->
<div class="chatbot-button" (click)="toggleChat()">
  💬
</div>

<!-- Janela do chatbot -->
<div class="chatbot-window" *ngIf="showChat">
  <div class="chatbot-header">
    <span>Assistente Virtual</span>
    <button (click)="toggleChat()">✖</button>
  </div>

  <div class="chatbot-messages">
    <div *ngFor="let msg of messages" [ngClass]="msg.sender">
      <span *ngIf="!msg.isHtml">{{ msg.text }}</span>
      <span *ngIf="msg.isHtml" [innerHTML]="msg.text"></span>
    </div>
  </div>

  <div class="chatbot-input">
    <input [(ngModel)]="input" placeholder="Digite sua mensagem..." (keyup.enter)="sendMessage()" />
    <button (click)="sendMessage()">➤</button>
  </div>
</div>


<style>
  /* Bolinha flutuante */
.chatbot-button {
  position: fixed;
  bottom: 25px;
  right: 25px;
  width: 60px;
  height: 60px;
  background-color: #648f80;
  color: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  transition: transform 0.2s;
}
.chatbot-button:hover {
  transform: scale(1.1);
}

/* Janela do chat */
.chatbot-window {
  position: fixed;
  bottom: 100px;
  right: 25px;
  width: 320px;
  height: 420px;
  background: #fff;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Cabeçalho */
.chatbot-header {
  background-color: #648f80;
  color: white;
  padding: 12px;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.chatbot-header button {
  background: none;
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

/* Área das mensagens */
.chatbot-messages {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* Mensagens */
.user {
  align-self: flex-end;
  background-color: #d1f2eb;
  color: #000;
  padding: 8px 12px;
  border-radius: 16px 16px 0 16px;
  max-width: 75%;
}
.bot {
  align-self: flex-start;
  background-color: #e0e0e0;
  color: #000;
  padding: 8px 12px;
  border-radius: 16px 16px 16px 0;
  max-width: 75%;
}

/* Campo de entrada */
.chatbot-input {
  display: flex;
  border-top: 1px solid #ccc;
}
.chatbot-input input {
  flex: 1;
  padding: 10px;
  border: none;
  outline: none;
}
.chatbot-input button {
  background-color: #648f80;
  color: white;
  border: none;
  padding: 10px 14px;
  cursor: pointer;
  font-size: 16px;
}
.chatbot-input button:hover {
  background-color: #527468;
}

</style>
