<app-navbar-auth></app-navbar-auth>

<div class="page-container">
  <div class="content-wrapper">

    <!-- Perfil do Usuário -->
    <p-card class="profile-card">
      <div class="profile-header">
        <p-avatar
          [image]="user.photo || 'https://via.placeholder.com/150'"
          shape="circle"
          size="xlarge"
          styleClass="avatar"
        ></p-avatar>

        <h2 class="profile-name">{{ user.name }}</h2>
        <p class="profile-email">{{ user.email }}</p>

        <!-- Botão Alterar Foto à esquerda -->
        <div class="upload-wrapper">
          <p-fileUpload
            mode="basic"
            name="profileImage"
            accept="image/*"
            maxFileSize="1000000"
            customUpload="true"
            chooseLabel="Alterar Foto"
            (uploadHandler)="alterarFoto($event)"
            styleClass="upload-btn"
          ></p-fileUpload>
        </div>
      </div>
    </p-card>

    <!-- Agendamentos -->
    <p-card class="agendamentos-card">
      <h3 class="agendamentos-title">Meus Agendamentos</h3>

      <ng-template #semAgendamentos>
        <p class="no-agendamentos">Nenhum agendamento encontrado.</p>
      </ng-template>
    </p-card>

  </div>
</div>

<app-footer></app-footer>

<style>
/* ===== Estrutura geral ===== */
html, body {
  height: 100%;
  margin: 0;
}

.page-container {
  background-color: #ffffff;
  height: calc(90vh - 90px); /* Ajuste navbar + footer */
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 1rem 2rem;
}

.content-wrapper {
  display: flex;
  flex-direction: row;
  gap: 2rem;
  justify-content: center;
  flex-wrap: wrap;
  max-width: 1000px;
  width: 100%;
}

/* ===== Perfil ===== */
.profile-card {
  width: 100%;
  max-width: 400px;
}

.profile-header {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}

.avatar img {
  border: 3px solid #007ad9;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
}

.profile-name {
  margin: 1rem 0 0.25rem;
  font-weight: 600;
  color: #333;
}

.profile-email {
  color: #777;
  margin-bottom: 1rem;
}

.upload-wrapper {
  width: 100%;
  display: flex;
  justify-content: flex-start;
}

/* Remove o texto "No file chosen" */
.upload-btn ::ng-deep input[type="file"] {
  position: absolute !important;
  width: 0 !important;
  height: 0 !important;
  opacity: 0 !important;
  pointer-events: none !important;
  z-index: -1 !important;
}

.upload-btn ::ng-deep .p-button {
  background-color: #007ad9;
  border: none;
  border-radius: 8px;
  padding: 0.5rem 1rem;
  font-weight: 500;
}

.upload-btn ::ng-deep .p-button:hover {
  background-color: #005fa3;
}

/* ===== Agendamentos ===== */
.agendamentos-card {
  flex: 1;
  min-width: 300px;
}

.agendamentos-title {
  font-size: 1.25rem;
  font-weight: 600;
  margin-bottom: 1rem;
  color: #2b5545;
  text-align: center;
}

.agendamentos-list {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.agendamento-item {
  padding: 1rem;
  border: 1px solid #e3ece9;
  border-radius: 8px;
  background-color: #f9f9f9;
  color: #333;
}

.no-agendamentos {
  text-align: center;
  color: #999;
  margin-top: 1rem;
}

/* ===== Responsivo ===== */
@media (max-width: 768px) {
  .content-wrapper {
    flex-direction: column;
    align-items: center;
  }

  .upload-wrapper {
    justify-content: center;
  }

  .agendamentos-title {
    text-align: center;
  }
}
</style>
